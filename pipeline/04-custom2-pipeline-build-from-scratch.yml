# Stages
# Stage-1:
  # Task-1: Build Docker Image and push to Azure Container Registry ACR
  # Task-2: Copy kube-manifest files to Build Artifact Directory
  # Task-3: Publish build articats to Azure Pipelines
# Pipeline Hierarchial Flow: Stages -> Stage -> Jobs -> Job -> Steps -> Task1, Task2, Task3 

trigger:
- main

#variables 
variables:
  - name: tag
    value: '$(Build.BuildId)'
  - name: serviceConnection
    value: 'azure-terraform-connection'   # your service connection name


stages:
  - stage: Build 
    displayName: Build Stage 
    jobs:
    - job: Build
      displayName: Build job
      pool:
        vmImage: 'ubuntu-latest'

      steps:
      # include terrafrom module to create cluster
      - task: TerraformInstaller@1
        displayName: 'Install Terraform'
        inputs:
          terraformVersion: 'latest'  # Specify the required version

# Uses Service Connection - NO secrets exposed
      - task: TerraformTaskV4@4
        displayName: 'Terraform Init'
        inputs:
          provider: 'azurerm'
          command: 'init'
          workingDirectory: '$(System.DefaultWorkingDirectory)/Azure_Aks_module'
          backendServiceArm: '$(serviceConnection)'        # Service Connection
          backendAzureRmResourceGroupName: 'rg-terraform-state'
          backendAzureRmStorageAccountName: 'tfstatestorage'
          backendAzureRmContainerName: 'tfstate'
          backendAzureRmKey: 'terraform.tfstate'

      - task: TerraformTaskV4@4
        displayName: 'Terraform Validate'
        inputs:
          provider: 'azurerm'
          command: 'validate'
          workingDirectory: '$(System.DefaultWorkingDirectory)/Azure_Aks_module'

      - task: TerraformTaskV4@4
        displayName: 'Terraform Plan'
        inputs:
          provider: 'azurerm'
          command: 'plan'
          workingDirectory: '$(System.DefaultWorkingDirectory)/Azure_Aks_module'
          environmentServiceNameAzureRM: '$(serviceConnection)'   # Service Connection

      - task: TerraformTaskV4@4
        displayName: 'Terraform Apply'
        inputs:
          provider: 'azurerm'
          command: 'apply'
          workingDirectory: '$(System.DefaultWorkingDirectory)/Azure_Aks_module'
          environmentServiceNameAzureRM: '$(serviceConnection)'   # Service Connectio

